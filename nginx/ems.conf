server {
  listen 80;
  listen [::]:80;
  server_name _;

  client_max_body_size 50M;

  location = / {
    return 302 /wms/;
  }

  location /eps/ {
    rewrite ^/eps/(.*)$ /$1 break;
    add_header X-EMS-Route eps always;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_pass http://eps-app:3000;
  }

  location = /eps {
    return 302 /eps/;
  }

  location /mms/ {
    rewrite ^/mms/(.*)$ /$1 break;
    add_header X-EMS-Route mms always;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_pass http://mms-app:3000;
  }

  location = /mms {
    return 302 /mms/;
  }

  location /wms/ {
    rewrite ^/wms/(.*)$ /$1 break;
    add_header X-EMS-Route wms always;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_pass http://wms-app:3000;
  }

  location = /wms {
    return 302 /wms/;
  }

  location /srs/ {
    rewrite ^/srs/(.*)$ /$1 break;
    add_header X-EMS-Route srs always;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_pass http://srs-app:3000;
  }

  location = /srs {
    return 302 /srs/;
  }

  location /api/eps/ {
    rewrite ^/api/eps/(.*)$ /api/$1 break;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_pass http://eps-app:3000;
  }

  location /api/mms/ {
    rewrite ^/api/mms/(.*)$ /api/$1 break;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_pass http://mms-app:3000;
  }

  location /api/wms/ {
    rewrite ^/api/wms/(.*)$ /api/$1 break;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_pass http://wms-app:3000;
  }

  location /api/srs/ {
    rewrite ^/api/srs/(.*)$ /api/$1 break;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_pass http://srs-app:3000;
  }
}
